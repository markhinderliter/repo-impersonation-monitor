# Manual discovery validation: exercises the DISCOVERY path the way an adopter
# eventually triggers the Action — from the Actions tab. It runs candidates.generate()
# live against the Search API for a fixed set of seed projects and scores every repo
# it surfaces.
#
# Rails (non-negotiable):
#   - workflow_dispatch ONLY: no push, no pull_request, no schedule. It can never
#     fire unattended and must never be wired as a required check.
#   - Least privilege: contents: read only. This is a dry-run, read-only pass —
#     it opens no issues, so it needs no issues: write.
#   - Metadata-only + read-only is enforced in the runner itself (read_pe=False,
#     never calls open_issue); this workflow only triggers it.

name: Live discovery (manual)

on:
  workflow_dispatch:
    inputs:
      max-candidates:
        description: "Per-seed candidate cap (rate-limit guard)."
        required: false
        default: "30"

permissions: {}

jobs:
  discovery:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install repo-impersonation-monitor
        run: python -m pip install .

      - name: Run live discovery (metadata-only, opens no issues)
        shell: bash
        env:
          RIM_LIVE: "1"
          # Default workflow token: read-only here (contents: read). Enough for
          # public repo reads and the Search API; cannot open issues.
          GITHUB_TOKEN: ${{ github.token }}
          # Passed via env (never interpolated into the shell line) so a dispatch
          # input can't become a command-injection vector.
          RIM_MAX_CANDIDATES: ${{ inputs.max-candidates }}
        run: |
          set -o pipefail
          python tools/live_discovery.py | tee -a "$GITHUB_STEP_SUMMARY"
