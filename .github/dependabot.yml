version: 2
updates:
  # Python runtime + dev dependencies.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # GitHub Actions used by action.yml and the workflows — keeps the SHA pins
  # fresh (Dependabot bumps the SHA and the version comment together).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
