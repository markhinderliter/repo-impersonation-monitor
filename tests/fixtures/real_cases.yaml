# Real-world cases with verified ground-truth labels.
#
# This is a manual-validation bed, NOT a unit-test target: nothing here is
# fetched over the network during unit tests. Each label is established by a
# canonical channel cited in ground_truth_evidence.
#
# expected_label:
#   do_not_flag            - verified legitimate; the tool must never flag it.
#   candidate_to_classify  - a look-alike to run through detection; label NOT yet
#                            established. UNVERIFIED cases must never be presented
#                            as confirmed malicious.
#
# Deliberately NO star/popularity field: popularity is not ground truth.

cases:
  - canonical_repo: heygen-com/hyperframes
    expected_label: do_not_flag
    ground_truth_evidence: >-
      Linked from heygen.com's help center to this org, establishing it as the
      legitimate HeyGen project.

  - canonical_repo: NousResearch/hermes-agent
    expected_label: do_not_flag
    ground_truth_evidence: >-
      The official site hermes-agent.nousresearch.com points to this repo under
      the Nous Research org.

  - canonical_repo: garrytan/gstack
    expected_label: do_not_flag
    ground_truth_evidence: >-
      Owned by Garry Tan (Y Combinator); legitimacy corroborated by OSSInsight
      analysis.

  - canonical_repo: mattpocock/skills
    expected_label: do_not_flag
    ground_truth_evidence: >-
      Owned by Matt Pocock; legitimacy corroborated by OSSInsight analysis.

  - canonical_repo: bytedance/deer-flow
    expected_label: do_not_flag
    ground_truth_evidence: >-
      Published under the official bytedance org.

  - canonical_repo: bigdatasciencegroup/bytedance-deer-flow
    expected_label: candidate_to_classify
    ground_truth_evidence: >-
      VERIFIED a FORK of bytedance/deer-flow (live check 2026-06-25: parent =
      bytedance/deer-flow, fork = true, created 2026-03-23). Its org-fold-style
      name is incidental: as a fork it is excluded from GitHub repo search by
      default, so neither exact-name nor permutation discovery can surface it.
      This is the weaponized-fork accepted gap (THREAT_MODEL §6), NOT the
      permutation / exact-name gap. Malicious status remains UNVERIFIED - listed
      as a candidate to classify, NOT a confirmed malicious case.
